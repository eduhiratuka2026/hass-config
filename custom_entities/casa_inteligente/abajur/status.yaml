sensor:
  - name: "Abajur em Texto"
    unique_id: abajur_em_texto
    icon: mdi:floor-lamp
    state: |
      {{ state_translated("light.abajur_local") }} · 
      {{- " " + int((state_attr("light.abajur_local", "brightness") / 255)*100) | string }}% · 
      
      {%- if is_state_attr('light.abajur_local', 'effect', 'off') and is_state_attr('light.abajur_local', 'color_mode', 'color_temp') -%}
        {{ " Branco" }}
      {% elif is_state_attr('light.abajur_local', 'effect', 'Scene') -%}
        {{ " Cena: " + state_attr("light.abajur_local", "scene_data") }}
      {% endif %}